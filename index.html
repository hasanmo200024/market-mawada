<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>ماركت المودة</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E7B34">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ماركت المودة">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800&family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#F7F6F0; --surface:#FFFFFF; --surface-2:#F1EFE6;
  --green:#1E7B34; --green-d:#145226; --green-l:#2FA24C;
  --orange:#F2921E; --orange-l:#FFB84D; --orange-d:#C97110;
  --text:#1B2A20; --text-mut:#69766D; --border:#E6E2D6;
  --danger:#C0392B; --danger-bg:#FBEAE8;
  --radius:18px; --radius-sm:12px;
  --shadow:0 4px 18px rgba(30,60,30,.08);
  --font-h:'Tajawal',sans-serif; --font-b:'Almarai',sans-serif;
}
.dark{
  --bg:#0D1410; --surface:#162019; --surface-2:#1D2921;
  --green:#39A85C; --green-d:#2C8347; --green-l:#4FC471;
  --orange:#F2A238; --orange-l:#FFC469; --orange-d:#D9861E;
  --text:#EAEDE8; --text-mut:#93A199; --border:#28352C;
  --danger:#E5695C; --danger-bg:#3A1F1C;
  --shadow:0 4px 18px rgba(0,0,0,.35);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:var(--font-b); background:var(--bg); color:var(--text); overflow-x:hidden; -webkit-tap-highlight-color:transparent;}
h1,h2,h3,.font-h{font-family:var(--font-h);}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,select,textarea{font-family:inherit; color:var(--text); background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:11px 13px; font-size:15px; width:100%;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--green); outline-offset:1px;}
::-webkit-scrollbar{width:0;height:0;}

/* ---------- LOCK SCREEN ---------- */
#lockScreen{position:fixed; inset:0; background:linear-gradient(160deg,var(--green-d),var(--green) 55%, var(--orange-d)); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; padding:24px; text-align:center;}
#lockScreen .logo-wrap{width:150px; height:150px; border-radius:34px; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 12px 30px rgba(0,0,0,.25); margin-bottom:22px; overflow:hidden; animation:pop .5s ease;}
#lockScreen .logo-wrap img{width:100%; height:100%; object-fit:contain; padding:10px;}
@keyframes pop{from{transform:scale(.7); opacity:0;} to{transform:scale(1); opacity:1;}}
#lockScreen h1{font-size:26px; margin-bottom:4px;}
#lockScreen p.tag{opacity:.9; font-size:14px; margin-bottom:34px;}
.pin-dots{display:flex; gap:14px; margin-bottom:22px;}
.pin-dot{width:16px; height:16px; border-radius:50%; border:2px solid #fff; transition:.15s;}
.pin-dot.filled{background:#fff;}
.pin-pad{display:grid; grid-template-columns:repeat(3,72px); gap:14px; margin-bottom:18px;}
.pin-pad button{width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,.15); color:#fff; font-size:24px; font-weight:700; display:flex; align-items:center; justify-content:center;}
.pin-pad button:active{background:rgba(255,255,255,.35);}
.pin-pad button.wide{font-size:14px;}
#biometricBtn{margin-top:6px; font-size:14px; text-decoration:underline; opacity:.9;}
#lockErr{color:#FFD9D0; font-size:13px; height:18px; margin-bottom:4px;}
.login-user-chip{padding:9px 16px; border-radius:24px; background:rgba(255,255,255,.15); color:#fff; font-size:13px; font-weight:700; border:2px solid transparent; display:flex; align-items:center; gap:6px;}
.login-user-chip.sel{background:#fff; color:var(--green-d); border-color:#fff;}
.login-user-chip .role-tag{font-size:9px; opacity:.75; font-weight:500;}

/* ---------- APP SHELL ---------- */
#app{display:none; min-height:100vh; padding-bottom:78px;}
#app.show{display:block;}
header.topbar{position:sticky; top:0; z-index:50; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; padding:12px 16px;}
header.topbar .top-logo{width:38px; height:38px; border-radius:10px; overflow:hidden; background:#fff; border:1px solid var(--border); flex-shrink:0;}
header.topbar .top-logo img{width:100%; height:100%; object-fit:contain;}
header.topbar .titles{flex:1; min-width:0;}
header.topbar .titles b{font-family:var(--font-h); font-size:15px; display:block;}
header.topbar .titles span{font-size:11px; color:var(--text-mut);}
header.topbar .icon-btn{width:38px; height:38px; border-radius:50%; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;}

main#view{padding:16px; max-width:640px; margin:0 auto;}

.section-title{font-family:var(--font-h); font-weight:800; font-size:19px; margin:6px 0 12px;}
.row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.muted{color:var(--text-mut); font-size:13px;}
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow);}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.stat-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow);}
.stat-card .icon{width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:8px;}
.stat-card .val{font-family:var(--font-h); font-weight:800; font-size:20px;}
.stat-card .lbl{font-size:12px; color:var(--text-mut);}

.btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:11px 18px; border-radius:var(--radius-sm); font-weight:700; font-size:14px;}
.btn-primary{background:var(--green); color:#fff;}
.btn-orange{background:var(--orange); color:#3a2200;}
.btn-outline{background:transparent; border:1.5px solid var(--border); color:var(--text);}
.btn-danger{background:var(--danger-bg); color:var(--danger);}
.btn-sm{padding:7px 12px; font-size:12.5px; border-radius:9px;}
.fab{position:fixed; bottom:92px; left:18px; width:56px; height:56px; border-radius:50%; background:var(--orange); color:#3a2200; font-size:26px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(0,0,0,.25); z-index:40;}

/* dept cards */
.dept-cards{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.dept-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); text-align:center;}
.dept-card .emoji{font-size:30px; margin-bottom:6px;}
.dept-card b{font-family:var(--font-h); font-size:14px; display:block;}
.dept-card span{font-size:11.5px; color:var(--text-mut);}

/* product / list rows */
.list-row{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:9px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow);}
.list-row .thumb{width:42px; height:42px; border-radius:10px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
.list-row .info{flex:1; min-width:0;}
.list-row .info b{display:block; font-size:14.5px; font-family:var(--font-h);}
.list-row .info span{font-size:12px; color:var(--text-mut);}
.badge{display:inline-block; padding:2px 8px; border-radius:20px; font-size:10.5px; font-weight:700;}
.badge-green{background:#E4F5E7; color:var(--green-d);}
.badge-orange{background:#FDEBD0; color:var(--orange-d);}
.badge-red{background:var(--danger-bg); color:var(--danger);}
.dark .badge-green{background:#1B3323;} .dark .badge-orange{background:#3A2A12;}

.tabs{display:flex; gap:6px; overflow-x:auto; margin-bottom:14px; padding-bottom:2px;}
.tabs button{flex-shrink:0; padding:8px 16px; border-radius:20px; font-size:13px; background:var(--surface-2); border:1px solid var(--border); font-weight:700;}
.tabs button.active{background:var(--green); color:#fff; border-color:var(--green);}

.search-box{display:flex; gap:8px; margin-bottom:14px;}
.search-box input{flex:1;}

/* bottom nav */
nav.bottomnav{position:fixed; bottom:0; inset-inline:0; background:var(--surface); border-top:1px solid var(--border); display:flex; z-index:60; padding:6px 2px calc(6px + env(safe-area-inset-bottom,0));}
nav.bottomnav button{position:relative; flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 2px; font-size:10.5px; color:var(--text-mut); border-radius:12px;}
nav.bottomnav button .ic{font-size:19px;}
nav.bottomnav button.active{color:var(--green); font-weight:700;}
.nav-badge{position:absolute; top:1px; left:calc(50% - 6px); background:var(--danger); color:#fff; border-radius:10px; font-size:9px; font-weight:700; padding:1px 5px; line-height:1.2;}

/* modal */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; display:none; align-items:flex-end; justify-content:center;}
.overlay.active{display:flex;}
.modal{background:var(--surface); width:100%; max-width:520px; max-height:88vh; overflow-y:auto; border-radius:22px 22px 0 0; padding:20px; animation:slideup .22s ease;}
@keyframes slideup{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal h3{font-family:var(--font-h); font-size:17px; margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{display:block; font-size:12.5px; color:var(--text-mut); margin-bottom:5px; font-weight:700;}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.modal-actions{display:flex; gap:10px; margin-top:14px;}
.modal-actions .btn{flex:1;}
.close-x{position:absolute; left:16px; top:14px; width:30px; height:30px; border-radius:50%; background:var(--surface-2); display:flex; align-items:center; justify-content:center;}

/* invoice printable */
#invoiceView{background:#fff; color:#111; padding:22px; border-radius:14px; font-family:var(--font-b);}
#invoiceView .inv-head{display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #1E7B34; padding-bottom:10px; margin-bottom:12px;}
#invoiceView .inv-head img{width:52px; height:52px; object-fit:contain;}
#invoiceView table{width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;}
#invoiceView th,#invoiceView td{border-bottom:1px solid #eee; padding:6px 4px; text-align:right;}
#invoiceView th{color:#1E7B34; font-family:var(--font-h);}
#invoiceView .inv-total{display:flex; justify-content:space-between; font-family:var(--font-h); font-weight:800; font-size:16px; margin-top:10px; border-top:2px dashed #ddd; padding-top:8px;}

.empty-state{text-align:center; padding:40px 16px; color:var(--text-mut);}
.empty-state .em{font-size:40px; margin-bottom:10px;}
.chart-box{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:14px;}
.chip{display:inline-flex; align-items:center; gap:6px; background:var(--surface-2); border:1px solid var(--border); border-radius:20px; padding:5px 11px; font-size:12px; margin:3px;}
.toast{position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:10px 18px; border-radius:30px; font-size:13px; z-index:400; opacity:0; transition:.25s;}
.toast.show{opacity:1;}
.switch{position:relative; width:46px; height:26px; background:var(--border); border-radius:20px; flex-shrink:0;}
.switch.on{background:var(--green);}
.switch .dot{position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.2s;}
.switch.on .dot{right:23px;}
.color-swatch{width:26px; height:26px; border-radius:50%; border:2px solid var(--border); display:inline-block; margin:3px; cursor:pointer;}
.color-swatch.sel{border-color:var(--text);}
details.card{padding:0; overflow:hidden;}
details.card summary{list-style:none; cursor:pointer; padding:16px; font-family:var(--font-h); font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:space-between;}
details.card summary::-webkit-details-marker{display:none;}
details.card summary::after{content:'▾'; transition:transform .2s; color:var(--text-mut); font-size:12px; font-weight:400;}
details.card[open] summary::after{transform:rotate(180deg);}
details.card .details-body{padding:0 16px 16px;}
.scan-btn{width:44px; height:44px; border-radius:var(--radius-sm); background:var(--surface-2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
.input-with-scan{display:flex; gap:8px; align-items:end;}
.input-with-scan .field{flex:1; margin-bottom:0;}
#scannerVideo{width:100%; border-radius:12px; background:#000; max-height:320px; object-fit:cover;}
#printArea{display:none;}
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{display:block !important; position:absolute; top:0; left:0; width:100%;}
}
.print-doc{background:#fff; color:#111; padding:16px; font-family:var(--font-b);}
.print-doc.fmt-a4{width:210mm; min-height:297mm; padding:14mm; margin:0 auto;}
.print-doc.fmt-58mm{width:58mm; padding:3mm; font-size:11px;}
.print-doc.fmt-80mm{width:80mm; padding:4mm; font-size:12.5px;}
.print-doc .p-head{display:flex; align-items:center; gap:10px; border-bottom:2px solid #1E7B34; padding-bottom:8px; margin-bottom:10px;}
.print-doc .p-head img{width:44px; height:44px; object-fit:contain;}
.print-doc.fmt-a4 .p-head img{width:60px; height:60px;}
.print-doc .p-head b{display:block; font-size:15px;}
.print-doc.fmt-a4 .p-head b{font-size:20px;}
.print-doc table{width:100%; border-collapse:collapse; margin-top:6px;}
.print-doc th, .print-doc td{text-align:right; padding:4px 2px; border-bottom:1px solid #ddd;}
.print-doc .p-total{display:flex; justify-content:space-between; font-weight:800; border-top:2px dashed #999; margin-top:8px; padding-top:6px;}
.print-doc .p-footer{text-align:center; margin-top:16px; padding-top:8px; border-top:1px dashed #ccc; font-size:10px; color:#777;}
</style>
</head>

/* ---------------- storage helpers ----------------
   يستخدم التطبيق تخزين Claude أثناء المعاينة هنا في المحادثة،
   وتلقائيًا يتحول لتخزين المتصفح (localStorage) عند رفعه كتطبيق مستقل (GitHub Pages مثلاً) */
async function loadJSON(key, fallback){
  try{
    if(window.storage && window.storage.get){
      const r = await window.storage.get(key,false);
      return r? JSON.parse(r.value) : fallback;
    }
  }catch(e){ /* لا يوجد تخزين Claude متاح، انتقل لتخزين المتصفح */ }
  try{
    const raw = localStorage.getItem('mwd_'+key);
    return raw? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}
async function saveJSON(key,val){
  try{
    if(window.storage && window.storage.set){
      const ok = await window.storage.set(key, JSON.stringify(val), false);
      if(ok) return;
    }
  }catch(e){ /* لا يوجد تخزين Claude متاح، انتقل لتخزين المتصفح */ }
  try{ localStorage.setItem('mwd_'+key, JSON.stringify(val)); }
  catch(e){ console.error('storage save failed',key,e); showToast('تعذر الحفظ، حاول مجددًا'); }
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function nowTime(){ const d=new Date(); return d.toTimeString().slice(0,5); }
function fmt(n){ n = Number(n)||0; return n.toLocaleString('ar-EG',{maximumFractionDigits:2}); }
/* حماية: لو مكتبة الرسم البياني (Chart.js) لم تُحمَّل بسبب مشكلة اتصال، لا نكسر باقي الصفحة */
function chartsAvailable(){
  if(typeof Chart==='undefined'){ console.warn('Chart.js لم يتم تحميلها — سيتم تخطي الرسوم البيانية'); return false; }
  return true;
}
function addTreasuryTx(type, amount, source, desc){
  if(!amount || amount<=0) return;
  DB.treasury.push({id:uid(), date:todayStr(), time:nowTime(), ts:Date.now(), type, amount, source, desc});
  saveJSON('treasury', DB.treasury);
}
function getTreasuryBalance(){
  return DB.treasury.reduce((a,t)=> a + (t.type==='in'? t.amount : -t.amount), 0);
}
function getAvgCost(p){ return (p && p.avgCost!=null)? p.avgCost : (p? p.costPrice||0 : 0); }
function priceLineHTML(p){
  return `تكلفة: ${fmt(p.costPrice)} · متوسط: ${fmt(getAvgCost(p))} · قطاعي: ${fmt(p.sellPrice)} · جملة: ${fmt(p.wholesalePrice)} · ج.جملة: ${fmt(p.superWholesalePrice)}`;
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------------- migration (لتحديث شكل البيانات القديمة بأمان) ---------------- */
function migrateDB(){
  DB.products.forEach(p=>{ if(p.avgCost==null) p.avgCost = p.costPrice||0; });
  if(!DB.suppliers) DB.suppliers=[];
  if(!DB.returns) DB.returns=[];
  if(!DB.waste) DB.waste=[];
  if(!DB.shifts) DB.shifts=[];
  if(!DB.auditLog) DB.auditLog=[];
  if(!DB.heldSales) DB.heldSales=[];
  if(!DB.stockAdjustments) DB.stockAdjustments=[];
  if(!DB.dayClosures) DB.dayClosures=[];
  if(!DB.settings.pinnedNav) DB.settings.pinnedNav = ['departments','sales','inventory','notifications'];
  if(!DB.settings.ownerPhone) DB.settings.ownerPhone = '01000000000';
  if(!DB.settings.ownerPassword) DB.settings.ownerPassword = 'owner1234';
  if(DB.settings.shopPhone==null) DB.settings.shopPhone = '';
  if(!DB.settings.purchaseSelectMode) DB.settings.purchaseSelectMode = 'dropdown';
  if(DB.settings.allowOversell==null) DB.settings.allowOversell = false;
  DB.products.forEach(p=>{ if(p.unitsPerBox==null) p.unitsPerBox = 1; });
  DB.version = 3;
}

  DB.sales       = await loadJSON('sales', []);

  DB.shifts      = await loadJSON('shifts', []);
  DB.auditLog    = await loadJSON('auditLog', []);
  DB.heldSales   = await loadJSON('heldSales', []);
  DB.stockAdjustments = await loadJSON('stockAdjustments', []);
  DB.dayClosures = await loadJSON('dayClosures', []);
  DB.treasury    = await loadJSON('treasury', []);
  DB.settings    = await loadJSON('settings', DEFAULT_SETTINGS);
  DB.users       = await loadJSON('users', []);
  migrateDB();
  if(!DB.users || DB.users.length===0){
    DB.users = [{id:'u1', name:'المدير', pin:(DB.settings.pin||'1234'), role:'admin', active:true}];
    saveJSON('users', DB.users);
  }
  if(DB.settings.dark) document.documentElement.classList.add('dark');
  document.getElementById('darkBtn').textContent = DB.settings.dark? '☀️':'🌙';
  buildLoginUsers();
  buildPinPad();

  setInterval(()=>{ saveJSON('auto_backup_snapshot', {savedAt:new Date().toISOString(), DB}); }, 120000);
}
boot();

/* ---------------- LOCK / PIN ---------------- */
let pinBuffer = '';
function buildLoginUsers(){
  const wrap = document.getElementById('loginUserChips');
  const active = DB.users.filter(u=>u.active!==false);
  wrap.innerHTML = active.map(u=>`<button class="login-user-chip ${state.selectedUserId===u.id?'sel':''}" onclick="selectLoginUser('${u.id}')">👤 ${u.name}<span class="role-tag">${u.role==='admin'?'مدير':'كاشير'}</span></button>`).join('');
  if(!state.selectedUserId && active.length) state.selectedUserId = active[0].id;
  if(active.length) wrap.querySelectorAll('.login-user-chip').forEach((el,i)=>{ if(active[i].id===state.selectedUserId) el.classList.add('sel'); });
}
function selectLoginUser(id){ state.selectedUserId=id; buildLoginUsers(); pinBuffer=''; renderPinDots(); document.getElementById('lockErr').textContent=''; }
function buildPinPad(){
  const pad = document.getElementById('pinPad');
  const keys = ['1','2','3','4','5','6','7','8','9','⌫','0','✓'];
  pad.innerHTML='';
  keys.forEach(k=>{
    const b=document.createElement('button');
    if(k==='⌫'||k==='✓') b.className='wide';
    b.textContent=k;
    b.onclick=()=>pinKey(k);
    pad.appendChild(b);
  });
  renderPinDots();
}
function renderPinDots(){
  const wrap = document.getElementById('pinDots'); wrap.innerHTML='';
  for(let i=0;i<4;i++){ const d=document.createElement('div'); d.className='pin-dot'+(i<pinBuffer.length?' filled':''); wrap.appendChild(d); }
}
function pinKey(k){
  if(Date.now()<pinLockUntil) return;
  const err = document.getElementById('lockErr');
  if(k==='⌫'){ pinBuffer=pinBuffer.slice(0,-1); err.textContent=''; renderPinDots(); return; }
  if(k==='✓'){ checkPin(); return; }
  if(pinBuffer.length<4){ pinBuffer+=k; renderPinDots(); }
  if(pinBuffer.length===4) setTimeout(checkPin,120);
}
function checkPin(){
  const err = document.getElementById('lockErr');
  if(Date.now()<pinLockUntil) return;
  const user = DB.users.find(u=>u.id===state.selectedUserId && u.active!==false);
  if(user && pinBuffer === user.pin){
    failedPinAttempts = 0;
    currentUser = user;
    unlockApp();
  }else{
    failedPinAttempts++;
    pinBuffer=''; renderPinDots();
    if(failedPinAttempts>=5){
      const lockSeconds = 30;
      pinLockUntil = Date.now() + lockSeconds*1000;
      let remaining = lockSeconds;
      err.textContent = 'محاولات كثيرة خاطئة، الرجاء الانتظار '+remaining+' ثانية';
      clearInterval(pinLockTimer);
      pinLockTimer = setInterval(()=>{
        remaining--;
        if(remaining<=0){ clearInterval(pinLockTimer); err.textContent=''; failedPinAttempts=0; }
        else err.textContent = 'محاولات كثيرة خاطئة، الرجاء الانتظار '+remaining+' ثانية';
      },1000);
    }else{
      err.textContent='الرقم السري غير صحيح';
    }
  }
}
function unlockApp(){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('app').classList.add('show');
  try{ applyRoleVisibility(); }catch(e){ console.error('applyRoleVisibility failed', e); }
  try{ renderBottomNav(); }catch(e){ console.error('renderBottomNav failed', e); }
  try{ updateConnStatus(); }catch(e){ console.error('updateConnStatus failed', e); }
  try{ addAudit('تسجيل دخول', currentUser? currentUser.role:''); }catch(e){ console.error('addAudit failed', e); }
  try{ resetInactivityTimer(); }catch(e){ console.error('resetInactivityTimer failed', e); }
  go('home');
}
/* ---------------- الشريط السفلي القابل للتخصيص ---------------- */
function renderBottomNav(){
  const bar = document.getElementById('bottomNavBar');
  if(!bar) return;
  const isAdmin = currentUser && currentUser.role==='admin';
  const pinned = (DB.settings.pinnedNav||[]).filter(k=> NAV_ITEMS[k] && (!NAV_ITEMS[k].adminOnly || isAdmin)).slice(0,4);
  let html = `<button data-nav="home" onclick="go('home')"><span class="ic">🏠</span>الرئيسية</button>`;
  pinned.forEach(key=>{
    const it = NAV_ITEMS[key];
    const badge = key==='notifications'? `<span id="navNotifBadge" class="nav-badge" style="display:none">0</span>` : '';
    html += `<button data-nav="${it.view||key}" onclick="navItemGo('${key}')"><span class="ic">${it.icon}</span>${it.label}${badge}</button>`;
  });
  html += `<button data-nav="more" onclick="openMoreSheet()"><span class="ic">☰</span>المزيد</button>`;
  bar.innerHTML = html;
  document.querySelectorAll('.bottomnav button').forEach(b=>b.classList.toggle('active', b.dataset.nav===state.view));
  updateNavBadge();
}
/* ---------------- قفل تلقائي بعد فترة خمول ---------------- */
let inactivityTimer = null;
function resetInactivityTimer(){
  clearTimeout(inactivityTimer);
  const mins = DB.settings.autoLockMinutes||0;
  if(!mins || !currentUser) return;
  inactivityTimer = setTimeout(lockNow, mins*60000);
}
function lockNow(){
  if(!currentUser) return;
  addAudit('قفل تلقائي', 'بعد '+(DB.settings.autoLockMinutes||0)+' دقيقة خمول');
  state.selectedUserId = currentUser.id;
  document.getElementById('app').classList.remove('show');
  document.getElementById('lockScreen').style.display='flex';
  buildLoginUsers(); pinBuffer=''; renderPinDots();
}
['click','touchstart','keydown'].forEach(ev=>document.addEventListener(ev, ()=>resetInactivityTimer()));

let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();

async function tryBiometric(){
  if(!DB.settings.biometric){ showToast('البصمة غير مفعّلة، فعّلها من لوحة التحكم'); return; }
  if(!window.PublicKeyCredential){ showToast('البصمة غير مدعومة على هذا الجهاز/المتصفح'); return; }
  try{
    const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if(!available){ showToast('لا يوجد مستشعر بصمة متاح هنا، استخدم الرقم السري'); return; }
    showToast('يرجى استخدام الرقم السري داخل هذه النافذة (المتصفح لا يسمح بتفعيل البصمة الكاملة داخل نافذة محادثة)');
  }catch(e){ showToast('تعذّر تشغيل البصمة هنا، استخدم الرقم السري'); }
}

function saveOwnerCredentials(){
  const phone = document.getElementById('f-newOwnerPhone').value.trim();
  const pass1 = document.getElementById('f-newOwnerPass1').value;
  const pass2 = document.getElementById('f-newOwnerPass2').value;
  if(!phone || phone.length<8){ showToast('أدخل رقم هاتف صحيح'); return; }
  if(pass1 && pass1.length<4){ showToast('كلمة المرور قصيرة جدًا'); return; }
  if(pass1 && pass1!==pass2){ showToast('كلمتا المرور غير متطابقتين'); return; }
  DB.settings.ownerPhone = phone;
  if(pass1) DB.settings.ownerPassword = pass1;
  saveJSON('settings', DB.settings);
  addAudit('تحديث بيانات دخول المطوّر', phone);
  showToast('تم حفظ بيانات الدخول');

async function checkForAppUpdate(){
  if(!('serviceWorker' in navigator)){ showToast('غير مدعوم داخل هذه المعاينة، يعمل بعد الرفع على GitHub Pages'); return; }
  try{
    const reg = await navigator.serviceWorker.getRegistration();
    if(reg){ await reg.update(); showToast('تم التحقق من وجود تحديثات'); }
    else showToast('لا يوجد Service Worker مسجل بعد');
  }catch(e){ showToast('تعذّر التحقق من التحديث'); }
}
async function forceClearCacheAndReload(){
  try{
    if('caches' in window){
      const keys = await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    showToast('تم مسح الذاكرة المؤقتة، جارٍ إعادة التحميل...');
    setTimeout(()=>location.reload(), 800);
  }catch(e){ showToast('تعذّر مسح الذاكرة المؤقتة'); }
}

    else if(view==='departments') renderDepartments();

    else if(view==='inventory') renderInventory();
    else if(view==='customers') renderCustomers();

    else if(view==='admin') renderAdmin();
    else if(view==='reports') renderReports(extra);

/* ---------------- notifications & more sheet ---------------- */
function getNotifications(){
  const list = [];
  const lowStock = DB.products.filter(p=>p.qty<=(DB.settings.lowStock||5));
  lowStock.forEach(p=>{
    list.push({type:'stock', icon:'⚠️', color:'var(--danger)', title:'كمية منخفضة: '+p.name, desc:'الكمية المتبقية: '+p.qty+' وحدة فقط', action:()=>openProductModal(p.id)});
  });
  const now = Date.now();
  DB.products.filter(p=>p.expiryDate).forEach(p=>{
    const days = Math.ceil((new Date(p.expiryDate).getTime()-now)/86400000);
    if(days<0) list.push({type:'expiry', icon:'⛔', color:'var(--danger)', title:'منتهي الصلاحية: '+p.name, desc:'انتهت الصلاحية منذ '+Math.abs(days)+' يوم', action:()=>openProductModal(p.id)});
    else if(days<=7) list.push({type:'expiry', icon:'⏳', color:'var(--orange-d)', title:'قرب انتهاء الصلاحية: '+p.name, desc:'باقي '+days+' يوم على انتهاء الصلاحية', action:()=>openProductModal(p.id)});
  });
  const inDebt = DB.customers.filter(c=>(c.debt||0)>0).sort((a,b)=>b.debt-a.debt);
  inDebt.forEach(c=>{
    list.push({type:'debt', icon:'💳', color:'var(--orange-d)', title:'دين مستحق على: '+c.name, desc:'المبلغ: '+fmt(c.debt)+' ج', action:()=>go('customerDetail', c.id)});
  });
  if(currentUser && currentUser.role==='admin'){
    const owedSuppliers = DB.suppliers.filter(s=>(s.owed||0)>0).sort((a,b)=>b.owed-a.owed);
    owedSuppliers.forEach(s=>{
      list.push({type:'supplier', icon:'🚚', color:'var(--orange-d)', title:'مستحق لمورد: '+s.name, desc:'المبلغ: '+fmt(s.owed)+' ج', action:()=>go('supplierDetail', s.id)});
    });
  }
  return list;
}
function updateNavBadge(){
  const count = getNotifications().length;
  [document.getElementById('navNotifBadge'), document.getElementById('topNotifBadge')].forEach(badge=>{
    if(!badge) return;
    if(count>0){ badge.style.display='block'; badge.textContent = count>99? '99+': count; }
    else{ badge.style.display='none'; }
  });
}

/* ================= DEPARTMENTS ================= */
function renderDepartments(){
  const isAdmin = currentUser && currentUser.role==='admin';
  document.getElementById('fabBtn').style.display = isAdmin? 'flex':'none';
  document.getElementById('fabBtn').onclick=()=>openProductModal(null, state.deptFilter!=='all'? state.deptFilter : null);
  const chips = `<button class="${state.deptFilter==='all'?'active':''}" onclick="state.deptFilter='all'; renderDepartments()">الكل</button>` +
    DB.departments.map(d=>`<button class="${state.deptFilter===d.id?'active':''}" onclick="state.deptFilter='${d.id}'; renderDepartments()">${d.emoji} ${d.name}</button>`).join('');
  document.getElementById('view').innerHTML = `
  <div class="section-title">الأصناف</div>
  <div class="tabs">${chips}</div>
  <div class="input-with-scan" style="margin-bottom:14px">
    <div class="field"><input id="itemsSearch" placeholder="🔍 ابحث بالاسم أو الباركود" oninput="filterItemsList(this.value)"></div>
    <button class="scan-btn" onclick="openBarcodeScanner('itemsSearch', true, ()=>filterItemsList(document.getElementById('itemsSearch').value))" title="مسح بالكاميرا">📷</button>
  </div>
  <div id="itemsListBody">${itemsListRows(getFilteredItems())}</div>
  `;
}
function getFilteredItems(q){
  q = (q||'').trim().toLowerCase();
  return DB.products.filter(p=> (state.deptFilter==='all'||p.deptId===state.deptFilter) && (!q || p.name.toLowerCase().includes(q) || (p.barcode||'').includes(q)));
}
function itemsListRows(products){
  const isAdmin = currentUser && currentUser.role==='admin';
  if(products.length===0) return `<div class="empty-state"><div class="em">🏷️</div>لا توجد أصناف${isAdmin?`<br><button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="openProductModal()">إضافة أول صنف</button>`:''}</div>`;
  return products.map(p=>{
    const dept = DB.departments.find(d=>d.id===p.deptId);
    const low = p.qty<=(DB.settings.lowStock||5);
    return `<div class="list-row" onclick="${isAdmin?`openProductModal('${p.id}')`:''}">
      <div class="thumb">${dept?dept.emoji:'🏷️'}</div>
      <div class="info"><b>${p.name}</b><span>${dept?dept.name:''} · باركود: ${p.barcode||'—'} · الكمية: ${p.qty}${p.unitType==='weight'?' كجم':''} ${low?'<span class=\"badge badge-red\">منخفض</span>':''}</span></div>
      <div style="text-align:left"><b style="font-size:14px">${fmt(p.sellPrice)} ج</b></div>
    </div>`;
  }).join('');
}
function filterItemsList(q){
  document.getElementById('itemsListBody').innerHTML = itemsListRows(getFilteredItems(q));
}

function openDeptModal(id){
  const d = id? DB.departments.find(x=>x.id===id) : null;
  state.editingId = id||null;
  const colors = ['#1E7B34','#F2921E','#2F80C4','#E0562B','#7A56C9','#6B7A70','#C0392B','#0E9594'];
  const emojis = ['🥫','🧀','🥤','🍎','🧴','📦','🍞','🍬','🧊','🥩','🐟','🍚','🧃','🧻','🧼','🍫'];
  showModal(d? 'تعديل القسم':'إضافة قسم جديد', `
    <div class="field"><label>اسم القسم</label><input id="f-deptName" value="${d?d.name:''}" placeholder="مثال: المخبوزات"></div>
    <div class="field"><label>اختر رمز القسم</label><div>${emojis.map(e=>`<button class="btn-sm" style="font-size:20px;background:var(--surface-2);border-radius:10px;margin:3px" onclick="document.getElementById('f-deptEmoji').value='${e}'; showToast('تم الاختيار')">${e}</button>`).join('')}</div>
      <input id="f-deptEmoji" value="${d?d.emoji:'📦'}" placeholder="أو اكتب إيموجي" style="margin-top:8px"></div>
    <div class="field"><label>لون القسم</label><div>${colors.map(c=>`<span class="color-swatch ${d&&d.color===c?'sel':''}" style="background:${c}" onclick="document.getElementById('f-deptColor').value='${c}'; document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('sel')); event.target.classList.add('sel')"></span>`).join('')}
      <input type="hidden" id="f-deptColor" value="${d?d.color:colors[0]}"></div>
    <div class="modal-actions">
      ${d?`<button class="btn btn-danger" onclick="requireAdmin(()=>deleteDept('${d.id}'),'حذف قسم')">حذف</button>`:''}
      <button class="btn btn-primary" onclick="saveDept()">حفظ</button>
    </div>
  `);
}
function saveDept(){
  const name = document.getElementById('f-deptName').value.trim();
  const emoji = document.getElementById('f-deptEmoji').value.trim()||'📦';
  const color = document.getElementById('f-deptColor').value;
  if(!name){ showToast('اكتب اسم القسم'); return; }
  if(state.editingId){
    const d = DB.departments.find(x=>x.id===state.editingId);
    d.name=name; d.emoji=emoji; d.color=color;
  }else{
    DB.departments.push({id:uid(), name, emoji, color});
  }
  saveJSON('departments', DB.departments);
  addAudit('حفظ قسم', name);
  closeModal(); showToast('تم الحفظ'); go(state.view==='admin'?'admin':'departments');
}
function deleteDept(id){
  if(DB.products.some(p=>p.deptId===id)){ showToast('لا يمكن حذف قسم يحتوي على أصناف'); return; }
  const d = DB.departments.find(x=>x.id===id);
  DB.departments = DB.departments.filter(d=>d.id!==id);
  saveJSON('departments', DB.departments);
  addAudit('حذف قسم', d? d.name: id);
  closeModal(); showToast('تم الحذف'); go(state.view==='admin'?'admin':'departments');
}

let productFormDraft = null;
function captureProductFormDraft(){
  return {
    name: document.getElementById('f-pName')?.value || '',
    barcode: document.getElementById('f-pBarcode')?.value || '',
    deptId: document.getElementById('f-pDept')?.value || '',
    unitType: document.getElementById('f-unitType')?.value || 'count',
    boxQty: document.getElementById('f-boxQty')?.value || '1',
    boxCost: document.getElementById('f-boxCost')?.value || '0',
    cost: document.getElementById('f-pCost')?.value || '',
    sell: document.getElementById('f-pSell')?.value || '',
    wholesale: document.getElementById('f-pWholesale')?.value || '',
    superWholesale: document.getElementById('f-pSuperWholesale')?.value || '',
    qty: document.getElementById('f-pQty')?.value || '',
    expiry: document.getElementById('f-pExpiry')?.value || '',
  };
}
function scanBarcodeForProductForm(){
  productFormDraft = captureProductFormDraft();
  openBarcodeScanner('f-pBarcode', false, (value)=>{
    if(productFormDraft) productFormDraft.barcode = value;
    reopenProductModalWithDraft();
  });
}
function reopenProductModalWithDraft(){
  const draft = productFormDraft; productFormDraft = null;
  openProductModal(state.editingId, draft? draft.deptId : null);
  if(!draft) return;
  setTimeout(()=>{
    const setVal = (id,val)=>{ const el=document.getElementById(id); if(el && val!=null && val!=='') el.value = val; };
    setVal('f-pName', draft.name);
    setVal('f-pBarcode', draft.barcode);
    setVal('f-pDept', draft.deptId);
    setVal('f-unitType', draft.unitType);
    setVal('f-boxQty', draft.boxQty);
    setVal('f-boxCost', draft.boxCost);
    setVal('f-pCost', draft.cost);
    setVal('f-pSell', draft.sell);
    setVal('f-pWholesale', draft.wholesale);
    setVal('f-pSuperWholesale', draft.superWholesale);
    setVal('f-pQty', draft.qty);
    setVal('f-pExpiry', draft.expiry);
    toggleUnitLabels();
    calcItemMargin();
  }, 60);
}
function openProductModal(id, deptId){
  const p = id? DB.products.find(x=>x.id===id): null;
  state.editingId = id||null;
  const deptOptions = DB.departments.map(d=>`<option value="${d.id}" ${((p&&p.deptId===d.id)||(!p&&deptId===d.id))?'selected':''}>${d.emoji} ${d.name}</option>`).join('');
  showModal(p?'تعديل الصنف':'إضافة صنف جديد', `
    <div class="field"><label>اسم الصنف</label><input id="f-pName" value="${p?p.name:''}" placeholder="مثال: أرز أبو كاس 1 كجم"></div>
    <div class="field"><label>الباركود</label>
      <div class="input-with-scan">
        <div class="field" style="margin-bottom:0"><input id="f-pBarcode" value="${p?p.barcode:''}" placeholder="امسح أو اكتب"></div>
        <button class="scan-btn" onclick="scanBarcodeForProductForm()" title="مسح بالكاميرا">📷</button>
        <button class="scan-btn" onclick="generateBarcode()" title="توليد رقم">🎲</button>
      </div>
    </div>
    <div class="field"><label>القسم</label><select id="f-pDept">${deptOptions}</select></div>
    <div class="field"><label>نوع الوحدة</label><select id="f-unitType" onchange="toggleUnitLabels()">
      <option value="count" ${p&&p.unitType==='weight'?'':'selected'}>بالعدد (قطعة)</option>
      <option value="weight" ${p&&p.unitType==='weight'?'selected':''}>بالوزن (كيلوجرام)</option>
    </select></div>
    <div class="card" style="margin-bottom:12px;background:var(--surface-2)">
      <div class="muted" style="font-size:12px;font-weight:700;margin-bottom:8px">📦 حاسبة سعر الكرتونة أو الشيكارة</div>
      <div class="field-row">
        <div class="field"><label id="f-boxQtyLabel">عدد الوحدات في الكرتونة</label><input id="f-boxQty" type="number" min="0.001" step="0.001" value="1" oninput="calcBoxPrice()"></div>
        <div class="field"><label id="f-boxCostLabel">سعر الكرتونة كاملة</label><input id="f-boxCost" type="number" step="0.01" value="0" oninput="calcBoxPrice()"></div>
      </div>
      <div class="row" style="font-size:13px;margin-bottom:8px"><span class="muted" id="f-boxResultLabel">سعر الوحدة المحسوب</span><b id="f-boxUnitResult">0.00 ج</b></div>
      <button class="btn btn-outline btn-sm" style="width:100%" onclick="applyBoxPrice()">✅ تطبيق السعر المحسوب على سعر التكلفة</button>
    </div>
    <div class="field-row">
      <div class="field"><label>سعر التكلفة</label><input id="f-pCost" type="number" step="0.01" value="${p?p.costPrice:''}" placeholder="0.00" oninput="calcItemMargin()"></div>
      <div class="field"><label>سعر البيع (تجزئة)</label><input id="f-pSell" type="number" step="0.01" value="${p?p.sellPrice:''}" placeholder="0.00" oninput="calcItemMargin()"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>سعر الجملة</label><input id="f-pWholesale" type="number" step="0.01" value="${p?p.wholesalePrice:''}" placeholder="0.00" oninput="calcItemMargin()"></div>
      <div class="field"><label>سعر جملة الجملة</label><input id="f-pSuperWholesale" type="number" step="0.01" value="${p?p.superWholesalePrice:''}" placeholder="0.00"></div>
    </div>
    <div class="card" style="margin-bottom:12px;background:var(--surface-2)">
      <div id="itemMarginCalc" style="font-size:12px;display:flex;gap:12px;flex-wrap:wrap">
        <span class="muted">أدخل الأسعار لحساب هامش الربح تلقائيًا</span>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label id="f-pQtyLabel">الكمية الحالية بالمخزون</label><input id="f-pQty" type="number" step="0.001" value="${p?p.qty:0}" placeholder="0"></div>
      <div class="field"><label>تاريخ الصلاحية (اختياري)</label><input id="f-pExpiry" type="date" value="${p&&p.expiryDate?p.expiryDate:''}"></div>
    </div>
    ${p? `<div class="card" style="margin-bottom:12px;background:var(--surface-2)">
      <div class="row" style="font-size:13px"><span class="muted">متوسط سعر التكلفة (تلقائي)</span><b>${fmt(getAvgCost(p))} ج</b></div>
      <div class="row" style="font-size:13px;margin-top:4px"><span class="muted">هامش الربح (تجزئة)</span><b style="color:var(--green)">${fmt(p.sellPrice-getAvgCost(p))} ج</b></div>
    </div>`:''}
    <div class="modal-actions">
      ${p?`<button class="btn btn-danger" onclick="requireAdmin(()=>deleteProduct('${p.id}'),'حذف صنف')">حذف</button>`:''}
      <button class="btn btn-primary" onclick="saveProduct()">حفظ الصنف</button>
    </div>
  `);
  setTimeout(()=>{ calcItemMargin(); toggleUnitLabels(); }, 50);
}
function toggleUnitLabels(){
  const type = document.getElementById('f-unitType')?.value;
  const isWeight = type==='weight';
  const boxQtyLabel = document.getElementById('f-boxQtyLabel');
  const boxCostLabel = document.getElementById('f-boxCostLabel');
  const boxResultLabel = document.getElementById('f-boxResultLabel');
  const pQtyLabel = document.getElementById('f-pQtyLabel');
  if(boxQtyLabel) boxQtyLabel.textContent = isWeight? 'وزن الكرتونة/الشيكارة (كجم)' : 'عدد الوحدات في الكرتونة';
  if(boxCostLabel) boxCostLabel.textContent = isWeight? 'سعر الكرتونة/الشيكارة كاملة' : 'سعر الكرتونة كاملة';
  if(boxResultLabel) boxResultLabel.textContent = isWeight? 'سعر الكيلوجرام المحسوب' : 'سعر الوحدة المحسوب';
  if(pQtyLabel) pQtyLabel.textContent = isWeight? 'الكمية الحالية بالمخزون (كجم)' : 'الكمية الحالية بالمخزون';
  calcBoxPrice();
}
function calcItemMargin(){
  const cost = parseFloat(document.getElementById('f-pCost')?.value)||0;
  const sale = parseFloat(document.getElementById('f-pSell')?.value)||0;
  const whole = parseFloat(document.getElementById('f-pWholesale')?.value)||0;
  const el = document.getElementById('itemMarginCalc'); if(!el) return;
  if(!cost && !sale){ el.innerHTML = '<span class="muted">أدخل الأسعار لحساب هامش الربح</span>'; return; }
  const m1 = sale-cost, p1 = cost>0?(m1/cost*100):0;
  const m2 = whole-cost, p2 = cost>0?(m2/cost*100):0;
  el.innerHTML = `<span>تجزئة: <b style="color:${m1>=0?'var(--green)':'var(--danger)'}">${fmt(m1)} ج (${p1.toFixed(1)}%)</b></span>`+
    (whole>0? `<span>جملة: <b style="color:${m2>=0?'var(--green)':'var(--danger)'}">${fmt(m2)} ج (${p2.toFixed(1)}%)</b></span>`:'');
}
function calcBoxPrice(){
  const qty = parseFloat(document.getElementById('f-boxQty')?.value)||1;
  const boxCost = parseFloat(document.getElementById('f-boxCost')?.value)||0;
  const unitCost = qty>0? boxCost/qty : 0;
  const el = document.getElementById('f-boxUnitResult'); if(el) el.textContent = fmt(unitCost)+' ج';
}
function applyBoxPrice(){
  const qty = parseFloat(document.getElementById('f-boxQty')?.value)||1;
  const boxCost = parseFloat(document.getElementById('f-boxCost')?.value)||0;
  const unitCost = qty>0? boxCost/qty : 0;
  document.getElementById('f-pCost').value = unitCost.toFixed(2);
  calcItemMargin();
  showToast('تم تطبيق سعر الوحدة على سعر التكلفة');
}
function generateBarcode(){
  const code = '2'+Math.floor(100000000000+Math.random()*899999999999).toString().slice(0,12);
  document.getElementById('f-pBarcode').value = code;
}
function saveProduct(){
  const name = document.getElementById('f-pName').value.trim();
  if(!name){ showToast('اكتب اسم الصنف'); return; }
  const data = {
    name,
    barcode: document.getElementById('f-pBarcode').value.trim(),
    deptId: document.getElementById('f-pDept').value,
    unitType: document.getElementById('f-unitType').value,
    unitsPerBox: parseFloat(document.getElementById('f-boxQty').value)||1,
    costPrice: parseFloat(document.getElementById('f-pCost').value)||0,
    sellPrice: parseFloat(document.getElementById('f-pSell').value)||0,
    wholesalePrice: parseFloat(document.getElementById('f-pWholesale').value)||0,
    superWholesalePrice: parseFloat(document.getElementById('f-pSuperWholesale').value)||0,
    qty: parseFloat(document.getElementById('f-pQty').value)||0,
    expiryDate: document.getElementById('f-pExpiry').value || null,
  };
  if(state.editingId){
    Object.assign(DB.products.find(x=>x.id===state.editingId), data);
  }else{
    DB.products.push({id:uid(), ...data, avgCost:data.costPrice});
  }
  saveJSON('products', DB.products);
  addAudit('حفظ صنف', name);
  closeModal(); showToast('تم حفظ الصنف'); go(state.view);
}
function deleteProduct(id){
  const p = DB.products.find(x=>x.id===id);
  DB.products = DB.products.filter(p=>p.id!==id);
  saveJSON('products', DB.products);
  addAudit('حذف صنف', p? p.name: id);
  closeModal(); showToast('تم حذف الصنف'); go(state.view);
}

    <div class="field"><label>المدفوع الآن (اتركه = الإجمالي لو دفعت نقدًا بالكامل)</label><input id="f-purPaid" type="number" step="0.01" placeholder="0.00"></div>
    <p class="muted" style="font-size:12px;margin-bottom:8px">أي فرق بين الإجمالي والمدفوع يُسجَّل كمديونية على المورد.</p>
    <div class="modal-actions"><button class="btn btn-primary" onclick="savePurchase()">حفظ وتحديث المخزون</button></div>
  `);
}
function filterPurchaseProductSearch(q, autoPick){
  q=(q||'').trim().toLowerCase();
  const box = document.getElementById('purchaseSearchResults');
  if(!q){ if(box) box.innerHTML=''; const h=document.getElementById('f-purProduct'); if(h) h.value=''; updatePurchasePreview(); return; }
  const list = DB.products.filter(p=>p.name.toLowerCase().includes(q)||(p.barcode||'').includes(q)).slice(0,6);
  if(autoPick && list.length===1){ selectPurchaseProduct(list[0].id, list[0].name); return; }
  if(!box) return;
  box.innerHTML = list.length===0? `<div class="muted" style="font-size:12px">لا نتائج</div>` :
    list.map(p=>`<div class="list-row" style="padding:8px 10px" onclick="selectPurchaseProduct('${p.id}', this.dataset.name)" data-name="${p.name.replace(/"/g,'&quot;')}"><div class="thumb">🏷️</div><div class="info"><b>${p.name}</b><span>باركود: ${p.barcode||'—'}</span></div></div>`).join('');
}
function selectPurchaseProduct(id, name){
  document.getElementById('f-purProduct').value = id;
  document.getElementById('f-purProductSearch').value = name;
  document.getElementById('purchaseSearchResults').innerHTML = '';
  updatePurchasePreview();
}
function togglePurchaseBoxMode(){
  const isBox = document.getElementById('f-purBoxToggle').classList.contains('on');
  document.getElementById('f-purQtyLabel').textContent = isBox? 'عدد الكراتين/الشكاير المشتراة' : 'الكمية';
  document.getElementById('f-purCostLabel').textContent = isBox? 'سعر الكرتونة/الشيكارة الواحدة' : 'سعر التكلفة للوحدة';
  updatePurchasePreview();
}
function updatePurchasePreview(){
  const preview = document.getElementById('f-purPreview');
  const boxHint = document.getElementById('f-purBoxHint');
  if(!preview) return;
  const productId = document.getElementById('f-purProduct')?.value;
  const p = DB.products.find(x=>x.id===productId);
  const isBox = document.getElementById('f-purBoxToggle')?.classList.contains('on');
  const enteredQty = parseFloat(document.getElementById('f-purQty')?.value)||0;
  const enteredCost = parseFloat(document.getElementById('f-purCost')?.value)||0;
  if(!p || (!enteredQty && !enteredCost)){ preview.style.display='none'; return; }
  const unitLabel = p.unitType==='weight'?'كجم':'وحدة';
  let qty, unitCost;
  if(isBox){
    const unitsPerBox = p.unitsPerBox||1;
    qty = enteredQty*unitsPerBox;
    unitCost = unitsPerBox>0? enteredCost/unitsPerBox : enteredCost;
    boxHint.style.display='block';
    boxHint.innerHTML = `سيُضاف <b>${fmt(qty)}</b> ${unitLabel} (حسب ${fmt(unitsPerBox)} ${unitLabel}/كرتونة المسجلة في الصنف)`;
  }else{
    qty = enteredQty; unitCost = enteredCost;
    boxHint.style.display='none';
  }
  const oldQty = p.qty; const oldAvg = getAvgCost(p);
  const newAvg = (oldQty>0)? ((oldQty*oldAvg)+(qty*unitCost))/(oldQty+qty || 1) : unitCost;
  document.getElementById('f-purNewUnitCost').textContent = fmt(unitCost)+' ج';
  document.getElementById('f-purNewAvgCost').textContent = fmt(newAvg)+' ج';
  document.getElementById('f-purSellLabel').textContent = 'سعر البيع (تجزئة) الجديد — الحالي: '+fmt(p.sellPrice)+' ج';
  document.getElementById('f-purWholesaleLabel').textContent = 'سعر الجملة الجديد — الحالي: '+fmt(p.wholesalePrice)+' ج';
  document.getElementById('f-purSuperLabel').textContent = 'سعر جملة الجملة الجديد — الحالي: '+fmt(p.superWholesalePrice)+' ج';
  preview.style.display='block';
}
function savePurchase(){
  const productId = document.getElementById('f-purProduct').value;
  const p = DB.products.find(x=>x.id===productId);
  if(!p){ showToast('اختر الصنف'); return; }
  const isBox = document.getElementById('f-purBoxToggle')?.classList.contains('on');
  const enteredQty = parseFloat(document.getElementById('f-purQty').value)||0;
  const enteredCost = parseFloat(document.getElementById('f-purCost').value)||0;
  let qty, cost;
  if(isBox){
    const unitsPerBox = p.unitsPerBox||1;
    qty = enteredQty*unitsPerBox;
    cost = unitsPerBox>0? enteredCost/unitsPerBox : enteredCost;
  }else{
    qty = enteredQty; cost = enteredCost;
  }
  const supplierId = document.getElementById('f-purSupplier').value || null;
  const total = qty*cost;
  let paid = document.getElementById('f-purPaid').value;
  paid = paid===''? total : (parseFloat(paid)||0);
  if(qty<=0){ showToast('أدخل كمية صحيحة'); return; }
  const owed = Math.max(0, total-paid);
  if(owed>0 && !supplierId){ showToast('اختر موردًا لتسجيل المديونية عليه'); return; }
  const oldQty = p.qty; const oldAvg = getAvgCost(p);
  if(cost>0){
    p.avgCost = (oldQty>0)? ((oldQty*oldAvg) + (qty*cost)) / (oldQty+qty) : cost;
    p.costPrice = cost; // آخر سعر تكلفة تم شراؤه به
  }
  p.qty = oldQty + qty;
  const newSell = parseFloat(document.getElementById('f-purNewSell').value);
  const newWholesale = parseFloat(document.getElementById('f-purNewWholesale').value);
  const newSuper = parseFloat(document.getElementById('f-purNewSuper').value);
  if(!isNaN(newSell)) p.sellPrice = newSell;
  if(!isNaN(newWholesale)) p.wholesalePrice = newWholesale;
  if(!isNaN(newSuper)) p.superWholesalePrice = newSuper;
  const supplierName = supplierId? DB.suppliers.find(s=>s.id===supplierId).name : 'مورد نقدي';
  DB.purchases.push({id:uid(), date:todayStr(), time:nowTime(), productId, productName:p.name, qty, costPrice:cost, supplierId, supplierName, total, paid, owed});
  if(supplierId && owed>0){ const s = DB.suppliers.find(x=>x.id===supplierId); s.owed = (s.owed||0)+owed; saveJSON('suppliers', DB.suppliers); }
  saveJSON('products', DB.products); saveJSON('purchases', DB.purchases);
  addTreasuryTx('out', paid, 'مشتريات', 'شراء '+fmt(qty)+' من '+p.name+' — '+supplierName);
  addAudit('تسجيل مشتريات', p.name+' × '+fmt(qty)+' — '+supplierName);
  closeModal(); showToast('تم تسجيل المشتريات وتحديث الخزينة'); go(state.view);
}

function renderHeldSalesUI(){
  if(DB.heldSales.length===0) return `<div class="empty-state"><div class="em">⏸️</div>لا توجد فواتير معلّقة</div>`;
  return [...DB.heldSales].reverse().map(h=>`
  <div class="list-row" onclick="resumeHeldSale('${h.id}')">
    <div class="thumb">⏸️</div>
    <div class="info"><b>فاتورة معلّقة — ${h.items.length} صنف</b><span>${h.savedAt}</span></div>
    <div style="text-align:left"><b>${fmt(h.items.reduce((a,it)=>a+it.total,0))} ج</b></div>
  </div>`).join('');
}
function holdCurrentSale(){
  if(state.invoiceCart.length===0) return;
  DB.heldSales.push({id:uid(), items:[...state.invoiceCart], customerId: state.invoiceCustomer, savedAt: todayStr()+' '+nowTime()});
  saveJSON('heldSales', DB.heldSales);
  state.invoiceCart = []; state.invoiceCustomer = null;
  showToast('تم تعليق الفاتورة'); state.salesTab='held'; renderSales();
}
function resumeHeldSale(id){
  const h = DB.heldSales.find(x=>x.id===id);
  if(!h) return;
  state.invoiceCart = [...h.items]; state.invoiceCustomer = h.customerId;
  DB.heldSales = DB.heldSales.filter(x=>x.id!==id);
  saveJSON('heldSales', DB.heldSales);
  state.salesTab='new'; renderSales(); showToast('تم استرجاع الفاتورة');
}
function changeCartQty(i, delta){
  const it = state.invoiceCart[i]; const p = DB.products.find(x=>x.id===it.productId);
  let newQty = Math.round((it.qty+delta)*1000)/1000;
  if(newQty<=0){ removeCartItem(i); return; }
  if(!DB.settings.allowOversell && p && newQty>p.qty){ showToast('الكمية المتاحة غير كافية'); return; }
  it.qty = newQty; it.total = Math.round(it.qty*it.unitPrice*100)/100;
  renderSales();
}
function openManualQtyModal(i){
  const it = state.invoiceCart[i];
  const p = DB.products.find(x=>x.id===it.productId);
  const isWeight = p && p.unitType==='weight';
  showModal('تحديد الكمية بدقة', `
    <div class="field"><label>${isWeight?'الكمية بالكيلوجرام':'الكمية'}</label><input id="f-manualQty" type="number" min="0" step="${isWeight?'0.001':'1'}" value="${it.qty}" autofocus></div>
    <div class="modal-actions"><button class="btn btn-primary" onclick="saveManualQty(${i})">تأكيد</button></div>
  `);
}
function saveManualQty(i){
  const it = state.invoiceCart[i];
  const p = DB.products.find(x=>x.id===it.productId);
  const qty = parseFloat(document.getElementById('f-manualQty').value);
  if(isNaN(qty)||qty<=0){ showToast('أدخل كمية صحيحة'); return; }
  if(!DB.settings.allowOversell && p && qty>p.qty){ showToast('الكمية المتاحة غير كافية'); return; }
  it.qty = qty; it.total = Math.round(it.qty*it.unitPrice*100)/100;
  closeModal(); renderSales();
}
function openPriceCheckModal(){
  showModal('فحص السعر', `

  const list = DB.products.filter(p=>p.name.toLowerCase().includes(q)||(p.barcode||'').includes(q)).slice(0,8);
  box.innerHTML = list.length===0? `<div class="muted" style="text-align:center;padding:10px">لا نتائج</div>` :
  list.map(p=>`
  <div class="list-row">
    <div class="thumb">🏷️</div>

function filterSaleProducts(q){
  q = q.trim().toLowerCase();
  const list = DB.products.filter(p=> (state.invoiceDeptFilter==='all'|| p.deptId===state.invoiceDeptFilter) && (p.name.toLowerCase().includes(q)||(p.barcode||'').includes(q)));

    list.map(p=>`
    <div class="list-row" onclick="addToCart('${p.id}')">
      <div class="thumb">🏷️</div>
      <div class="info"><b>${p.name}</b><span>متاح: ${p.qty}</span><span style="font-size:11px;display:block;margin-top:2px">${priceLineHTML(p)}</span></div>
      <button class="btn btn-primary btn-sm">إضافة</button>
    </div>`).join('');
}
function addToCart(productId){
  const p = DB.products.find(x=>x.id===productId);
  if(!p) return;
  if(!DB.settings.allowOversell && p.qty<=0){ showToast('الصنف غير متوفر بالمخزون'); return; }
  const existing = state.invoiceCart.find(it=>it.productId===productId);
  if(existing){
    if(DB.settings.allowOversell || existing.qty<p.qty){ existing.qty++; existing.total = existing.qty*existing.unitPrice; }
    else { showToast('الكمية المتاحة غير كافية'); }
  }
  else{ state.invoiceCart.push({productId, name:p.name, qty:1, priceType:'retail', unitPrice:p.sellPrice, total:p.sellPrice}); }
  renderSales();
}
function changeCartPriceType(i, type){
  const it = state.invoiceCart[i]; const p = DB.products.find(x=>x.id===it.productId);
  it.priceType = type;
  it.unitPrice = type==='retail'? p.sellPrice : type==='wholesale'? p.wholesalePrice : p.superWholesalePrice;
  it.total = it.unitPrice*it.qty;
  renderSales();
}
function removeCartItem(i){ state.invoiceCart.splice(i,1); renderSales(); }

function openCheckoutModal(){
  const total = state.invoiceCart.reduce((a,it)=>a+it.total,0);
  const custOptions = `<option value="">بدون عميل (نقدي)</option>` + DB.customers.map(c=>`<option value="${c.id}" ${state.invoiceCustomer===c.id?'selected':''}>${c.name}</option>`).join('');
  showModal('إتمام الفاتورة', `
    <div class="field"><label>العميل</label><select id="f-checkoutCustomer">${custOptions}</select></div>
    <div class="row" style="margin:10px 0"><span class="muted">الإجمالي</span><b class="font-h" style="font-size:18px">${fmt(total)} ج</b></div>
    <div class="field"><label>المبلغ المدفوع الآن</label><input id="f-paidAmount" type="number" step="0.01" value="${total}"></div>
    <p class="muted" style="font-size:12px;margin-bottom:8px">أي مبلغ متبقي سيُضاف كدين على العميل المختار.</p>
    <div class="modal-actions"><button class="btn btn-primary" onclick="finalizeSale()">تأكيد وإصدار الفاتورة</button></div>
  `);
}
function finalizeSale(){
  const customerId = document.getElementById('f-checkoutCustomer').value || null;
  const paid = parseFloat(document.getElementById('f-paidAmount').value)||0;
  const total = state.invoiceCart.reduce((a,it)=>a+it.total,0);
  const debt = Math.max(0, total-paid);
  if(debt>0 && !customerId){ showToast('اختر عميلاً لتسجيل الدين عليه'); return; }

  state.invoiceCart.forEach(it=>{ const p = DB.products.find(x=>x.id===it.productId); p.qty -= it.qty; });
  const invoiceNo = DB.sales.length + 1;
  const invoice = { id:uid(), invoiceNo, date:todayStr(), time:nowTime(), cashier: currentUser? currentUser.name:'—', customerId, customerName: customerId? DB.customers.find(c=>c.id===customerId).name : 'عميل نقدي', items:[...state.invoiceCart], total, paid, debt, photo:null };
  DB.sales.push(invoice);
  if(customerId && debt>0){ const c = DB.customers.find(x=>x.id===customerId); c.debt = (c.debt||0)+debt; }
  saveJSON('products', DB.products); saveJSON('sales', DB.sales); if(customerId) saveJSON('customers', DB.customers);
  addTreasuryTx('in', paid, 'مبيعات', 'فاتورة رقم '+invoiceNo+' — '+invoice.customerName);
  addAudit('فاتورة بيع', 'رقم #'+invoiceNo+' — '+fmt(total)+' ج');
  if(!getActiveShift()) showToast('تنبيه: لا توجد وردية مفتوحة حاليًا، يُفضّل فتح وردية من قائمة المزيد');
  state.invoiceCart=[]; state.invoiceCustomer=null;
  closeModal(); showToast('تم إصدار الفاتورة وتحديث الخزينة');
  viewInvoice(invoice.id);
}

function renderInvoices(){ state.salesTab='list'; go('sales'); }

function viewInvoice(id){
  const s = DB.sales.find(x=>x.id===id);
  if(!s) return;
  const no = s.invoiceNo || (DB.sales.indexOf(s)+1);
  const invReturns = DB.returns.filter(r=>r.saleId===s.id);
  const returnedQtyByProduct = {};
  invReturns.forEach(r=>r.items.forEach(it=>{ returnedQtyByProduct[it.productId] = (returnedQtyByProduct[it.productId]||0)+it.qty; }));
  showModal('فاتورة بيع رقم #'+no, `
    <div id="invoiceView">
      <div class="inv-head">
        <div><b class="font-h" style="font-size:16px">ماركت المودة</b><div class="muted" style="font-size:11px">خلوة ابو مسلم أمام المدرسة الإعدادية</div></div>
        <img src="data:image/jpeg;base64,${LOGO_B64}">
      </div>
      <div class="row" style="font-size:12.5px;margin-bottom:2px"><span>رقم الفاتورة: #${no}</span><span>${s.date} - ${s.time}</span></div>
      <div class="row" style="font-size:12.5px;margin-bottom:6px"><span>العميل: ${s.customerName}</span><span>الكاشير: ${s.cashier||'—'}</span></div>
      <table><thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
      <tbody>${s.items.map(it=>`<tr><td>${it.name}</td><td>${it.qty}</td><td>${fmt(it.unitPrice)}</td><td>${fmt(it.total)}</td></tr>`).join('')}</tbody></table>
      <div class="inv-total"><span>الإجمالي</span><span>${fmt(s.total)} ج</span></div>
      ${s.debt>0?`<div class="row" style="color:#C0392B;font-size:13px;margin-top:6px"><span>المدفوع</span><span>${fmt(s.paid)} ج</span></div><div class="row" style="color:#C0392B;font-size:13px"><span>المتبقي (دين)</span><span>${fmt(s.debt)} ج</span></div>`:''}
      ${s.photo? `<img src="${s.photo}" style="width:100%;border-radius:10px;margin-top:10px">`:''}
    </div>
    ${invReturns.length? `<div class="card" style="margin-top:12px;background:var(--surface-2)"><b class="font-h" style="font-size:13px">مرتجعات سابقة</b>${invReturns.map(r=>`<div class="row" style="font-size:12.5px;padding:4px 0"><span>${r.date} — ${r.items.map(it=>it.name+' ×'+it.qty).join('، ')}</span><span>-${fmt(r.total)} ج</span></div>`).join('')}</div>`:''}
    <div class="field" style="margin-top:12px"><label>إرفاق صورة الفاتورة (اختياري)</label><input type="file" accept="image/*" capture="environment" onchange="attachInvoicePhoto(event,'${s.id}')"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="openReturnModal('${s.id}')">↩️ إرجاع</button>
      <button class="btn btn-outline" onclick="openInvoicePrintOptions('${s.id}')">🖨️ طباعة/تصدير</button>
      <button class="btn btn-primary" onclick="closeModal()">إغلاق</button>
    </div>
  `);
}
function openReturnModal(saleId){
  const s = DB.sales.find(x=>x.id===saleId);
  const invReturns = DB.returns.filter(r=>r.saleId===saleId);
  const returnedQtyByProduct = {};
  invReturns.forEach(r=>r.items.forEach(it=>{ returnedQtyByProduct[it.productId] = (returnedQtyByProduct[it.productId]||0)+it.qty; }));
  const rows = s.items.map((it,i)=>{
    const already = returnedQtyByProduct[it.productId]||0;
    const maxQty = it.qty-already;
    if(maxQty<=0) return '';
    return `<div class="field-row" style="align-items:end">
      <div class="field"><label>${it.name} (بيعت: ${it.qty}${already?', أُرجعت: '+already:''})</label><input id="f-retQty-${i}" type="number" min="0" max="${maxQty}" step="1" value="0"></div>
    </div>`;
  }).join('');
  showModal('إرجاع من الفاتورة #'+(s.invoiceNo||''), `
    ${rows||'<p class="muted">كل الأصناف في هذه الفاتورة تم إرجاعها بالفعل.</p>'}
    <div class="modal-actions"><button class="btn btn-danger" onclick="confirmReturn('${saleId}')">تأكيد الإرجاع</button></div>
  `);
}
function confirmReturn(saleId){
  const s = DB.sales.find(x=>x.id===saleId);
  const items = [];
  s.items.forEach((it,i)=>{
    const el = document.getElementById('f-retQty-'+i);
    if(!el) return;
    const qty = parseFloat(el.value)||0;
    if(qty>0) items.push({productId:it.productId, name:it.name, qty, unitPrice:it.unitPrice, total: qty*it.unitPrice});
  });
  if(items.length===0){ showToast('حدد كمية للإرجاع'); return; }
  const total = items.reduce((a,it)=>a+it.total,0);
  items.forEach(it=>{ const p = DB.products.find(x=>x.id===it.productId); if(p) p.qty += it.qty; });
  DB.returns.push({id:uid(), date:todayStr(), time:nowTime(), saleId, invoiceNo:s.invoiceNo, customerId:s.customerId, items, total});
  let cashOut = total;
  if(s.customerId && s.debt>0){
    const c = DB.customers.find(x=>x.id===s.customerId);
    const reduceDebt = Math.min(c.debt, total);
    c.debt -= reduceDebt; cashOut = total-reduceDebt;
    saveJSON('customers', DB.customers);
  }
  saveJSON('products', DB.products); saveJSON('returns', DB.returns);
  if(cashOut>0) addTreasuryTx('out', cashOut, 'مرتجع بيع', 'إرجاع من فاتورة #'+(s.invoiceNo||'')+' — '+s.customerName);
  addAudit('إرجاع فاتورة', '#'+(s.invoiceNo||'')+' — '+fmt(total)+' ج');
  closeModal(); showToast('تم تسجيل الإرجاع وتحديث المخزون والخزينة');
}
function attachInvoicePhoto(ev,id){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{ const s = DB.sales.find(x=>x.id===id); s.photo = reader.result; saveJSON('sales', DB.sales); showToast('تم إرفاق الصورة'); viewInvoice(id); };
  reader.readAsDataURL(file);
}
function exportInvoicePDF(){
  if(typeof html2canvas==='undefined' || !window.jspdf){ showToast('تعذّر تحميل أداة تصدير PDF، تحقق من الاتصال بالإنترنت'); return; }
  const el = document.getElementById('invoiceView');
  showToast('جارٍ تجهيز الملف...');
  html2canvas(el,{scale:2,backgroundColor:'#ffffff'}).then(canvas=>{
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({unit:'pt', format:[canvas.width*0.5, canvas.height*0.5]});
    pdf.addImage(imgData,'PNG',0,0,canvas.width*0.5, canvas.height*0.5);
    pdf.save('فاتورة-'+Date.now()+'.pdf');
  }).catch(()=>showToast('حدث خطأ أثناء إنشاء الملف'));
}

/* ================= الطباعة والتصدير (PDF / A4 / إيصال 58مم / 80مم) =================
   اسم المحل والشعار إلزاميان في أعلى أي مستند مُصدَّر، واسم المطوّر إلزامي أسفله. */
function printShopHeader(format){
  return `<div class="p-head"><img src="data:image/jpeg;base64,${LOGO_B64}"><div><b>${DB.settings.shopName||'ماركت المودة'}</b>${format==='a4'?'<div style="font-size:11px;color:#666">خلوة ابو مسلم أمام المدرسة الإعدادية</div>':''}</div></div>`;
}
function printShopFooter(){
  return `<div class="p-footer">تصميم وتطوير: المودة للبرمجيات</div>`;
}
function printDocument(innerHtml, format){
  const area = document.getElementById('printArea');
  area.innerHTML = `<div class="print-doc fmt-${format}">${innerHtml}</div>`;
  setTimeout(()=>{ window.print(); }, 150);
}
function openInvoicePrintOptions(saleId){
  showModal('خيارات الطباعة والتصدير', `
    <p class="muted" style="font-size:12px;margin-bottom:10px">اختر الصيغة المناسبة لطابعتك؛ ستظهر نافذة الطباعة ليمكنك اختيار الطابعة أو الحفظ كـ PDF.</p>
    <div class="grid2">
      <button class="btn btn-outline" style="width:100%" onclick="closeModal(); exportInvoicePDF()">📄 حفظ PDF</button>
      <button class="btn btn-outline" style="width:100%" onclick="printInvoiceFormat('${saleId}','a4')">🖶 ورق A4</button>
      <button class="btn btn-outline" style="width:100%" onclick="printInvoiceFormat('${saleId}','58mm')">🧾 إيصال 58مم</button>
      <button class="btn btn-outline" style="width:100%" onclick="printInvoiceFormat('${saleId}','80mm')">🧾 إيصال 80مم</button>
    </div>
  `);
}
function printInvoiceFormat(saleId, format){
  const s = DB.sales.find(x=>x.id===saleId);
  if(!s) return;
  const no = s.invoiceNo || (DB.sales.indexOf(s)+1);
  let body = printShopHeader(format);
  body += `<div style="margin:6px 0">رقم الفاتورة: #${no} — ${s.date} ${s.time}<br>العميل: ${s.customerName}${s.cashier?' — الكاشير: '+s.cashier:''}</div>`;
  body += `<table><thead><tr><th>الصنف</th><th>ك</th><th>سعر</th><th>إجمالي</th></tr></thead><tbody>`;
  s.items.forEach(it=>{ body += `<tr><td>${it.name}</td><td>${it.qty}</td><td>${fmt(it.unitPrice)}</td><td>${fmt(it.total)}</td></tr>`; });
  body += `</tbody></table>`;
  body += `<div class="p-total"><span>الإجمالي</span><span>${fmt(s.total)} ج</span></div>`;
  if(s.debt>0) body += `<div style="color:#c0392b;margin-top:4px">المدفوع: ${fmt(s.paid)} ج — المتبقي (دين): ${fmt(s.debt)} ج</div>`;
  body += printShopFooter();
  closeModal();
  printDocument(body, format);
}
function printReportA4(){
  const el = document.getElementById('reportBody');
  if(!el) return;
  const clone = el.cloneNode(true);
  clone.querySelectorAll('canvas').forEach(c=>{
    const note = document.createElement('div');
    note.className='muted'; note.style.fontSize='11px'; note.style.padding='6px 0';
    note.textContent = '(الرسم البياني غير متاح عند الطباعة، راجعه من داخل التطبيق)';
    c.replaceWith(note);
  });
  const body = printShopHeader('a4') + `<div style="margin:8px 0;font-weight:700">تقرير بتاريخ ${todayStr()}</div>` + clone.innerHTML + printShopFooter();
  printDocument(body, 'a4');
}

/* ================= INVENTORY ================= */
function renderInventory(){
  const isAdmin = currentUser && currentUser.role==='admin';
  const totalItems = DB.products.length;
  const totalQty = DB.products.reduce((a,p)=>a+p.qty,0);
  const totalValue = DB.products.reduce((a,p)=>a+p.qty*getAvgCost(p),0);
  const totalRetailValue = DB.products.reduce((a,p)=>a+p.qty*p.sellPrice,0);
  document.getElementById('view').innerHTML = `
  <div class="section-title">المخزون — إجمالي البضاعة الموجودة</div>
  <div class="grid2" style="margin-bottom:14px">
    <div class="stat-card"><div class="val">${fmt(totalItems)}</div><div class="lbl">عدد الأصناف</div></div>
    <div class="stat-card"><div class="val">${fmt(totalQty)}</div><div class="lbl">إجمالي الكمية (وحدة)</div></div>
    ${isAdmin? `<div class="stat-card"><div class="val">${fmt(totalValue)} ج</div><div class="lbl">قيمة المخزون (بسعر التكلفة)</div></div>`:''}
    <div class="stat-card"><div class="val">${fmt(totalRetailValue)} ج</div><div class="lbl">قيمة المخزون (بسعر البيع)</div></div>
  </div>
  <div class="search-box"><input id="invSearch" placeholder="🔍 ابحث بالاسم أو الباركود" oninput="filterInventory(this.value)"><button class="scan-btn" onclick="openBarcodeScanner('invSearch', true, ()=>filterInventory(document.getElementById('invSearch').value))" title="مسح بالكاميرا">📷</button></div>
  <div id="invList">${inventoryRows(DB.products)}</div>
  `;
}
function inventoryRows(products){
  if(products.length===0) return `<div class="empty-state"><div class="em">📦</div>لا توجد أصناف مسجلة</div>`;
  const isAdmin = currentUser && currentUser.role==='admin';
  return products.map(p=>{
    const dept = DB.departments.find(d=>d.id===p.deptId);
    const low = p.qty<=(DB.settings.lowStock||5);
    const avg = getAvgCost(p);
    const detailLine = isAdmin? `متوسط تكلفة: ${fmt(avg)} ج · ربح: ${fmt(p.sellPrice-avg)} ج` : `سعر البيع: ${fmt(p.sellPrice)} ج`;
    return `<div class="list-row">
      <div class="thumb" onclick="${isAdmin?`openProductModal('${p.id}')`:''}">${dept?dept.emoji:'📦'}</div>
      <div class="info" onclick="${isAdmin?`openProductModal('${p.id}')`:''}"><b>${p.name}</b><span>${dept?dept.name:''} · ${detailLine} ${low?'<span class=\"badge badge-red\">منخفض</span>':''}</span></div>
      <div style="text-align:left;display:flex;align-items:center;gap:6px">
        <div><b>${p.qty}</b><div class="muted" style="font-size:11px">${p.unitType==='weight'?'كجم':'وحدة'}</div></div>
        ${isAdmin?`<button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); openStockAdjustModal('${p.id}')" title="تعديل الكمية">⚖️</button>`:''}
      </div>
    </div>`;
  }).join('');
}
function openStockAdjustModal(id){
  const p = DB.products.find(x=>x.id===id);
  if(!p) return;
  showModal('تعديل كمية: '+p.name, `
    <div class="row" style="margin-bottom:10px"><span class="muted">الكمية الحالية</span><b>${p.qty}</b></div>
    <div class="field"><label>الكمية الجديدة</label><input id="f-adjNewQty" type="number" step="1" value="${p.qty}"></div>
    <div class="field"><label>سبب التعديل</label><input id="f-adjReason" placeholder="مثال: جرد فعلي، خطأ إدخال..."></div>
    <div class="modal-actions"><button class="btn btn-primary" onclick="saveStockAdjust('${id}')">حفظ التعديل</button></div>
  `);
}
function saveStockAdjust(id){
  const p = DB.products.find(x=>x.id===id);
  const newQty = parseFloat(document.getElementById('f-adjNewQty').value);
  const reason = document.getElementById('f-adjReason').value.trim()||'غير محدد';
  if(isNaN(newQty)||newQty<0){ showToast('أدخل كمية صحيحة'); return; }
  const delta = newQty - p.qty;
  if(delta===0){ showToast('لم يتغير شيء'); closeModal(); return; }
  p.qty = newQty;
  DB.stockAdjustments.push({id:uid(), date:todayStr(), time:nowTime(), productId:id, productName:p.name, delta, newQty, reason, user: currentUser?currentUser.name:'—'});
  saveJSON('products', DB.products); saveJSON('stockAdjustments', DB.stockAdjustments);
  addAudit('تعديل كمية مخزون', p.name+' — '+(delta>0?'+':'')+delta+' ('+reason+')');
  closeModal(); showToast('تم تعديل الكمية'); go(state.view);
}
function filterInventory(q){
  q=q.trim().toLowerCase();
  document.getElementById('invList').innerHTML = inventoryRows(DB.products.filter(p=>p.name.toLowerCase().includes(q)||(p.barcode||'').includes(q)));
}

function openCustomerModal(id){
  const c = id? DB.customers.find(x=>x.id===id):null;
  state.editingId = id||null;
  showModal(c?'تعديل بيانات العميل':'إضافة عميل جديد', `
    <div class="field"><label>الاسم</label><input id="f-custName" value="${c?c.name:''}" placeholder="اسم العميل"></div>

function renderDebtAging(){
  const el = document.getElementById('debtAgeBody'); if(!el) return;
  const now = Date.now();
  const buckets = {b0:[], b30:[], b60:[], b90:[]};
  DB.customers.filter(c=>(c.debt||0)>0).forEach(cust=>{
    const unpaid = DB.sales.filter(s=>s.customerId===cust.id && s.debt>0);
    const oldest = unpaid.length? unpaid.reduce((a,b)=> new Date(a.date)<new Date(b.date)? a:b) : null;
    const days = oldest? Math.ceil((now-new Date(oldest.date).getTime())/86400000) : 0;
    const row = {name:cust.name, debt:cust.debt, days};
    if(days<=30) buckets.b0.push(row);
    else if(days<=60) buckets.b30.push(row);
    else if(days<=90) buckets.b60.push(row);
    else buckets.b90.push(row);
  });
  const groups = [['0-30 يوم','badge-green',buckets.b0],['31-60 يوم','badge-orange',buckets.b30],['61-90 يوم','badge-orange',buckets.b60],['أكثر من 90 يوم','badge-red',buckets.b90]];
  el.innerHTML = groups.map(([label,cls,arr])=>`
    <div style="margin-bottom:8px;padding:8px;background:var(--surface-2);border-radius:10px">
      <div class="row" style="margin-bottom:4px"><span style="font-size:12.5px;font-weight:700">${label}</span><span class="badge ${cls}">${arr.length} عميل</span></div>
      ${arr.length? arr.map(r=>`<div class="row" style="font-size:12px;padding:2px 0"><span>${r.name}</span><span style="color:var(--danger);font-weight:700">${fmt(r.debt)} ج</span></div>`).join('') : '<div class="muted" style="font-size:12px">لا يوجد</div>'}
    </div>`).join('');
}
function renderCashierPerf(){
  const el = document.getElementById('cashierPerfBody'); if(!el) return;
  const map = {};
  DB.sales.forEach(s=>{
    const key = s.cashier||'—';
    if(!map[key]) map[key]={count:0, total:0};
    map[key].count++; map[key].total+=s.total;
  });
  const rows = Object.entries(map).sort((a,b)=>b[1].total-a[1].total);
  el.innerHTML = rows.length===0? `<div class="muted" style="font-size:12px">لا توجد بيانات مبيعات بعد</div>` :
  rows.map(([name,d])=>`<div class="row" style="font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)"><span>${name}</span><span class="muted">${d.count} فاتورة</span><b>${fmt(d.total)} ج</b></div>`).join('');
}

  if(!chartsAvailable()) return;

  `);
}
function saveWasteEntry(){
  const productId = document.getElementById('f-wasteProduct').value;
  const qty = parseFloat(document.getElementById('f-wasteQty').value)||0;
  const reason = document.getElementById('f-wasteReason').value.trim()||'غير محدد';
  if(!productId||qty<=0){ showToast('اختر الصنف وأدخل كمية صحيحة'); return; }
  const p = DB.products.find(x=>x.id===productId);
  if(qty>p.qty){ showToast('الكمية أكبر من المتاح بالمخزون'); return; }
  const costLoss = qty*getAvgCost(p);
  p.qty -= qty;
  DB.waste.push({id:uid(), date:todayStr(), time:nowTime(), productId, productName:p.name, qty, reason, costLoss});
  saveJSON('products', DB.products); saveJSON('waste', DB.waste);
  addAudit('تسجيل تالف', p.name+' × '+qty+' — '+reason);
  closeModal(); showToast('تم تسجيل التالف'); go('waste');
}

function doOpenShift(){

function openCloseShiftModal(){
  const sh = getActiveShift();
  const txDuring = DB.treasury.filter(t=>t.ts>=sh.openedAt);
  const inSum = txDuring.filter(t=>t.type==='in').reduce((a,t)=>a+t.amount,0);
  const outSum = txDuring.filter(t=>t.type==='out').reduce((a,t)=>a+t.amount,0);
  const expected = sh.openingCash + inSum - outSum;
  showModal('إغلاق الوردية', `

function doCloseShift(expected){
  const actualCash = parseFloat(document.getElementById('f-shiftActual').value)||0;
  const sh = getActiveShift();
  sh.closedBy = currentUser? currentUser.name:'—';
  sh.closedAt = Date.now();
  sh.expectedCash = expected;
  sh.actualCash = actualCash;
  sh.difference = actualCash-expected;
  sh.status = 'closed';
  saveJSON('shifts', DB.shifts);
  addAudit('إغلاق وردية', 'الفرق: '+fmt(sh.difference));
  closeModal(); showToast('تم إغلاق الوردية'); go('shifts');
}

function saveUserEntry(){
  const name = document.getElementById('f-userName').value.trim();
  const role = document.getElementById('f-userRole').value;
  const pinRaw = document.getElementById('f-userPin').value.trim();
  const activeEl = document.getElementById('f-userActive');
  const active = activeEl? activeEl.classList.contains('on') : true;
  if(!name){ showToast('اكتب اسم المستخدم'); return; }
  if(!state.editingId && !/^\d{4}$/.test(pinRaw)){ showToast('أدخل رقم سري من 4 أرقام'); return; }
  if(pinRaw && !/^\d{4}$/.test(pinRaw)){ showToast('الرقم السري يجب أن يكون 4 أرقام'); return; }
  if(state.editingId){
    const u = DB.users.find(x=>x.id===state.editingId);
    if(u.role==='admin' && (role!=='admin' || !active) && DB.users.filter(x=>x.role==='admin'&&x.active!==false&&x.id!==u.id).length===0){
      showToast('لا يمكن — يجب أن يبقى مدير واحد فعّال على الأقل'); return;
    }
    u.name=name; u.role=role; u.active=active; if(pinRaw) u.pin=pinRaw;
  }else{
    DB.users.push({id:uid(), name, role, pin:pinRaw, active:true});
  }
  saveJSON('users', DB.users);
  addAudit('حفظ مستخدم', name+' — '+role);
  closeModal(); showToast('تم الحفظ'); buildLoginUsers(); renderAdmin();
}
