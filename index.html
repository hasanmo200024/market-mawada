function closeDayNow(){
  const date = todayStr();
  const sales = DB.sales.filter(s=>s.date===date).reduce((a,s)=>a+s.total,0);
  const purchases = DB.purchases.filter(p=>p.date===date).reduce((a,p)=>a+p.total,0);
  const profit = DB.sales.filter(s=>s.date===date).flatMap(s=>s.items).reduce((a,it)=>{ const p=DB.products.find(x=>x.id===it.productId); return a + (p? (it.unitPrice-getAvgCost(p))*it.qty : 0); },0);
  const treasuryBalance = getTreasuryBalance();
  const existing = DB.dayClosures.find(c=>c.date===date);
  const record = {date, sales, purchases, profit, treasuryBalance, closedBy: currentUser?currentUser.name:'—', closedAt:Date.now()};
  if(existing) Object.assign(existing, record);
  else DB.dayClosures.push(record);
  saveJSON('dayClosures', DB.dayClosures);
  addAudit('إغلاق يوم', date+' — مبيعات: '+fmt(sales));
  showToast('تم حفظ إغلاق اليوم'); renderAdmin();
}

/* ================= BARCODE SCANNER (مسح الباركود بالكاميرا) ================= */
let scannerStream = null, scannerRAF = null;
async function openBarcodeScanner(targetInputId, triggerInputEvent, onDetected){
  if(!('BarcodeDetector' in window)){
    showModal('مسح الباركود', `<p class="muted" style="text-align:center;padding:20px">المسح بالكاميرا غير مدعوم على هذا المتصفح حاليًا (مدعوم على Chrome للأندرويد). الرجاء إدخال الباركود يدويًا أو توليد رقم.</p><div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">حسنًا</button></div>`);
    return;
  }
  showModal('امسح الباركود', `
    <video id="scannerVideo" autoplay playsinline muted></video>
    <p class="muted" style="text-align:center;margin-top:10px;font-size:12px">وجّه الكاميرا نحو الباركود</p>
    <div class="modal-actions"><button class="btn btn-outline" style="width:100%" onclick="closeModal()">إلغاء</button></div>
  `);
  try{
    scannerStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video = document.getElementById('scannerVideo');
    if(!video){ scannerStream.getTracks().forEach(t=>t.stop()); scannerStream=null; return; }
    video.srcObject = scannerStream;
    const detector = new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code']});
    const scanLoop = async ()=>{
      if(!document.getElementById('scannerVideo')) return; // تم إغلاق النافذة
      try{
        const codes = await detector.detect(video);
        if(codes.length>0){
          const value = codes[0].rawValue;
          closeModal();
          const input = document.getElementById(targetInputId);
          if(input){ input.value = value; if(triggerInputEvent) input.dispatchEvent(new Event('input')); }
          if(onDetected) onDetected(value);
          showToast('تم مسح الباركود: '+value);
          return;
        }
      }catch(e){ /* تجاهل أخطاء الإطار الواحد ونكمل المحاولة */ }
      scannerRAF = requestAnimationFrame(scanLoop);
    };
    scanLoop();
  }catch(e){
    showToast('تعذّر الوصول للكاميرا، تأكد من إعطاء إذن الكاميرا');
    closeModal();
  }
}
function stopBarcodeScanner(){
  if(scannerRAF){ cancelAnimationFrame(scannerRAF); scannerRAF=null; }
  if(scannerStream){ scannerStream.getTracks().forEach(t=>t.stop()); scannerStream=null; }
}

/* ================= MODAL HELPERS ================= */
function showModal(title, bodyHtml){
  document.getElementById('modalBody').innerHTML = `<button class="close-x" onclick="closeModal()">✕</button><h3>${title}</h3>${bodyHtml}`;
  document.getElementById('overlay').classList.add('active');
}
function closeModal(){ stopBarcodeScanner(); document.getElementById('overlay').classList.remove('active'); }
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });

/* تسجيل Service Worker لدعم إضافة التطبيق للشاشة الرئيسية عند رفعه كموقع مستقل */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{/* تجاهل الفشل داخل بيئة المعاينة */});
  });
}
</script>
